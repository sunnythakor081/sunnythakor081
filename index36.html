<html>
<html long="en">
<head>
     <meta charset="UTF-8>
	 <meta name="viewport" content="width=device-width, initial-scale=1.0">
	 <meta http-equiv="x-UA-compatibie" content="ie=edge">
	 <title>keyframes and animations</title>
	 <style>
	 .container{
	    background-color: gray;
	 
	 }
	 .box{
	   background-color: green;
	   width: 250px;
	   height: 250px;
	   position: relative;
	/*   animation-name: haeey1; */
         animation-name: haeey2;
	   animation-duration: 0.1s;
	   animation-iteration-count: 1;
	 /*  animation-fill-mode: alternate; */
	  /* animation-timing-function: ease-in-out; */
	/*   animation-delay: 3s; */
	 /*  animation-direction: reverse; */
	  
	 
	 }
	  
	 @keyframes haeey2{
	  0%{
	  top: 0px;
	  left: 0px;
	}
	  25%{
	  top: 250px;
	  left: 0px;
	  }
	  75%{
	  top: 250px;
	  left: 250px;
	  }
	  100%{
	  top: 0px;
	  left: 250px;
	  }
	 }
	 
	 @keyframes haeey 1{
	     from {
		  
            width: 100px;
		}
		 to  {
		    width: 1400px;
		}
	 }
	</style>
	 </head>
	 <body>
	 <div class="container">
	 <div class="box">
	this is box  
	 </div>
	 </body>
</html>
