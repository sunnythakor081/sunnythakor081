<html>
<html long="en">
<head>
     <meta charset="UTF-8>
	 <meta name="viewport" content="width=device-width, initial-scale=1.0">
	 <meta http-equiv="x-UA-compatibie" content="ie=edge">
	 <title>css transitions</title>
	 <style>
	 body{
	   background-color: black;
	 }
	 #box{
	    display: flex;
		height:200px;
		width: 200px;
		background-color: red;
		justify-content: center;
		align-items:center;
		transition-property: background-color;
		/* transition-duration: 1s;
		transition-timing-function: ease-out; 
		transition-delay: 3s;	*/
		transition: all 1s ease-in-out .1s;
	  }
	  #box:hover{
	    background-color: yellow;
		height: 500px;
		width: 1200px;
		border-radius: 100px;
		font-size: 50px;
	  }
	</style>
	 </head>
	 <body>
	 <h3>this is css transitions tutorial</h3>
	 <div class="container">
	 <div id="box">
	    this is my box  
	 
	 </div>
	 
	 </body>
</html>
