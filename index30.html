<html>
<html long="en">
<head>
     <meta charset="UTF-8>
	 <meta name="viewport" content="width=device-width, initial-scale=1.0">
	 <meta http-equiv="x-UA-compatibie" content="ie=edge">
	 <title>media queries</title>
	 <style>
   .box {
	    font-size: 72px;
	    text-align: center;	
	   background-color: red;
	   color: white;
	   display: none;
	   }
	   @media (max-width:300px){
	    #box-1{
		        display: block;
					background-color: cyan;
		 }
	  }	  
	   @media (max-width:500px) {
	       #box-2{
		        display: block;
				background-color: blueviolet;
	    }
	  }
	  @media (min-width:500px) and (max-width:799px){
	       #box-3{
		        display: block;
				color: black;
				background-color: yellow;
	    }
	  }
	  @media (min-width: 800px){
	       #box-4{
		        display: block;
				background-color: green; 
	    }
	  }
	</style>
	 </head>
	 <body>
	 <div class="box" id="box-1">mai ek iphone hoon</div>
	 <div class="box" id="box-2">mai ek tablet hoon</div>
	 <div class="box" id="box-3">mai ek desktop computer hoon</div>
	 <div class="box" id="box-4">mai ek widescreen computer hoon</div>
	 </body>
</html>
